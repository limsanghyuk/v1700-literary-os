[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "v1700-literary-os"
version = "1.28.0"
description = "V1700 Literary OS Stage128 — SharedWorld / SharedCharacter Read-Only Absorption"
requires-python = ">=3.10"
authors = [{name = "V1700 Project"}]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
