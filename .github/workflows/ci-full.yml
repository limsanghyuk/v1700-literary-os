name: ci-full
on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  full-lineage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e .
      - run: python -m pytest -q tests
      - run: python tools/run_stage72_repo_doctor.py
