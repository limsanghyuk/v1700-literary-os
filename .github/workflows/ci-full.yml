name: ci-full

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: read

jobs:
  full-lineage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile source and tools
        run: python -m compileall -q src tools

      - name: Run full pytest suite
        run: python -m pytest tests/ -q

      - name: Run full release gate
        run: python tools/run_release_gate.py

      - name: Run repo doctor
        run: python tools/run_stage72_repo_doctor.py
