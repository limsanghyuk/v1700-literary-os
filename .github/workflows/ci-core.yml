name: ci-core

on:
  push:
    branches:
      - main
      - "stage/**"
      - "stage*-*"
    tags:
      - "v1700-stage*"
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest-and-gates (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile source and tools
        run: python -m compileall -q src tools

      - name: Run active-lineage pytest suite
        run: python -m pytest tests/test_stage135_learning_quality_gate.py tests/test_stage136_schema_registry.py tests/test_stage137_migration_manager.py tests/test_stage138_losdb_storage_contracts.py tests/test_stage139_corpus_governance_pipeline.py tests/test_stage140_release_integrity.py tests/test_stage141_prose_generation_e2e.py tests/test_stage142_longform_benchmark_pack.py tests/test_stage143_user_cli_api_docs.py tests/stage_gates/test_stage72_repo_doctor.py -q

      - name: Run Stage134 MetaLearner audit baseline
        run: python tools/run_stage134_meta_learner_audit.py

      - name: Run Stage134 release gate baseline
        run: python tools/run_stage134_release_gate.py

      - name: Run Stage135 LearningQualityGate
        run: python tools/run_stage135_learning_quality_gate.py

      - name: Run Stage135 release gate
        run: python tools/run_stage135_release_gate.py

      - name: Run Stage136 SchemaRegistry
        run: python tools/run_stage136_schema_registry.py

      - name: Run Stage136 release gate
        run: python tools/run_stage136_release_gate.py

      - name: Run Stage137 MigrationManager
        run: python tools/run_stage137_migration_manager.py

      - name: Run Stage137 release gate
        run: python tools/run_stage137_release_gate.py

      - name: Run Stage138 LOSDB Storage Contracts
        run: python tools/run_stage138_losdb_storage_contracts.py

      - name: Run Stage138 release gate
        run: python tools/run_stage138_release_gate.py

      - name: Run Stage139 Corpus Governance Pipeline
        run: python tools/run_stage139_corpus_governance_pipeline.py

      - name: Run Stage139 release gate
        run: python tools/run_stage139_release_gate.py

      - name: Check Stage140 metadata consistency
        run: python tools/check_stage_metadata_consistency.py

      - name: Check Stage140 release asset integrity
        run: python tools/check_release_asset_integrity.py

      - name: Run Stage140 Release Integrity
        run: python tools/run_stage140_release_integrity.py

      - name: Run Stage140 release gate
        run: python tools/run_stage140_release_gate.py

      - name: Run Stage141 Prose Generation E2E Harness
        run: python tools/run_stage141_prose_generation_e2e.py

      - name: Run Stage141 release gate
        run: python tools/run_stage141_release_gate.py

      - name: Run Stage142 Longform Benchmark Pack
        run: python tools/run_stage142_longform_benchmark_pack.py

      - name: Run Stage142 release gate
        run: python tools/run_stage142_release_gate.py

      - name: Run Stage143 User CLI/API Minimum Docs
        run: python tools/run_stage143_user_cli_api_docs.py

      - name: Run Stage143 release gate
        run: python tools/run_stage143_release_gate.py

      - name: Run main release gate
        run: python tools/run_release_gate.py

      - name: Run repo doctor
        run: python tools/run_stage72_repo_doctor.py

  preflight:
    name: gitnexus-and-ci-preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check test imports against dev extras
        run: python tools/run_ci_dependency_preflight.py

      - name: Probe GitNexus optional sidecar
        run: python tools/run_gitnexus_probe.py

      - name: Run GraphNexus release gate
        run: python tools/run_graph_nexus_release_gate.py
