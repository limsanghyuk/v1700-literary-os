name: ci-core

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m compileall -q src tools tests
      - run: python tools/check_stage_metadata_consistency.py
      - run: python tools/check_release_asset_integrity.py
      - run: python tools/run_stage178_page06_release_seal.py
      - run: python tools/run_stage178_release_gate.py
      - run: python tools/run_release_gate.py
      - run: python -m pytest tests/test_stage174_release_policy_registry.py tests/test_stage175_project_boundary_governor.py tests/test_stage176_lineage_review_gate.py tests/test_stage177_operational_safety_rollback_governance.py tests/test_stage178_page06_release_seal.py tests/stage_gates/test_stage72_repo_doctor.py -q
