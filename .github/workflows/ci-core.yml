name: ci-core

on:
  push:
    branches:
      - main
      - "stage/**"
      - "stage*-*"
    tags:
      - "v1700-stage*"
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: gitnexus-and-ci-preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check mandatory protocol and dependency preflight
        run: |
          python tools/run_mandatory_predevelopment_check.py
          python tools/run_ci_dependency_preflight.py
          python tools/run_gitnexus_probe.py

  test:
    name: pytest-and-gates (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile source and tools
        run: python -m compileall -q src tools

      - name: Run Page05 pytest and repo doctor suite
        run: python -m pytest tests/test_stage167_evaluation_contract.py tests/test_stage168_local_evaluation_packet_store.py tests/test_stage169_deterministic_quality_continuity_evaluator.py tests/test_stage170_regression_negative_fixture_harness.py tests/test_stage171_evaluation_boundary_leakage_preflight.py tests/test_stage172_page05_release_seal.py tests/stage_gates/test_stage72_repo_doctor.py -q

      - name: Run Stage167 to Stage172 release chain
        run: |
          python tools/run_stage167_evaluation_contract.py
          python tools/run_stage167_release_gate.py
          python tools/run_stage168_local_evaluation_packet_store.py
          python tools/run_stage168_release_gate.py
          python tools/run_stage169_deterministic_quality_continuity_evaluator.py
          python tools/run_stage169_release_gate.py
          python tools/run_stage170_regression_negative_fixture_harness.py
          python tools/run_stage170_release_gate.py
          python tools/run_stage171_evaluation_boundary_leakage_preflight.py
          python tools/run_stage171_release_gate.py
          python tools/run_stage172_page05_release_seal.py
          python tools/run_stage172_release_gate.py

      - name: Run authority gates
        run: |
          python tools/check_stage_metadata_consistency.py
          python tools/check_release_asset_integrity.py
          python tools/run_release_gate.py
          python tools/run_stage72_repo_doctor.py
