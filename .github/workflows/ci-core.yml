name: ci-core

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m compileall -q src tools tests
      - run: python tools/regenerate_sha256sums.py
      - run: python tools/check_stage_metadata_consistency.py
      - run: python tools/check_release_asset_integrity.py
      - run: python tools/run_stage184_release_gate.py
      - run: python tools/run_release_gate.py
      - run: python -m pytest tests/test_release_asset_integrity.py tests/test_stage179_evolution_contract.py tests/test_stage180_architecture_drift_self_audit.py tests/test_stage181_migration_plan_compiler.py tests/test_stage182_upgrade_simulation_compatibility_sandbox.py tests/test_stage183_future_absorption_deprecation_planner.py tests/test_stage184_page07_release_seal.py tests/stage_gates/test_stage72_repo_doctor.py -q
