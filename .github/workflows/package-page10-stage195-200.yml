name: package-page10-stage195-200

on:
  push:
    branches:
      - roadmap-page08-page17-commercial-absorption
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build package
        run: |
          mkdir -p /tmp/v1700_page10_stage195_200
          rsync -a --exclude='.git' ./ /tmp/v1700_page10_stage195_200/
          cd /tmp
          zip -r v1700_page10_stage195_200_integrated_repository.zip v1700_page10_stage195_200
      - uses: actions/upload-artifact@v4
        with:
          name: v1700_page10_stage195_200_integrated_repository
          path: /tmp/v1700_page10_stage195_200_integrated_repository.zip
          if-no-files-found: error
