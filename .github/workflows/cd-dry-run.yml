name: cd-dry-run

on:
  push:
    branches:
      - main
      - "stage*-*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: build-release-archive-dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify release gates
        run: |
          python -m compileall -q src tools
          python -m pytest tests/test_stage135_learning_quality_gate.py tests/test_stage136_schema_registry.py tests/test_stage137_migration_manager.py tests/test_stage138_losdb_storage_contracts.py tests/test_stage139_corpus_governance_pipeline.py tests/test_stage140_release_integrity.py tests/test_stage141_prose_generation_e2e.py tests/test_stage142_longform_benchmark_pack.py tests/test_stage143_user_cli_api_docs.py tests/test_stage144_split_ci_runtime_strategy.py tests/test_stage145_body_constitution.py tests/test_stage146_narrative_state_contract.py tests/test_stage147_project_manifest_body.py tests/test_stage148_node_boundary_constitution.py tests/test_stage149_body_constitution_release_gate.py tests/test_stage150_memory_contract.py tests/test_stage151_local_read_only_memory_store.py tests/test_stage152_memory_query_interface.py tests/test_stage153_memory_health_leakage_boundary.py tests/test_stage154_page02_release_seal.py tests/test_stage155_execution_contract.py tests/test_stage156_local_execution_packet_store.py tests/test_stage157_deterministic_plan_graph_builder.py tests/test_stage158_dependency_conflict_preflight.py tests/test_stage159_execution_dry_run_trace.py tests/test_stage160_page03_release_seal.py -q
          python tools/run_stage135_learning_quality_gate.py
          python tools/run_stage135_release_gate.py
          python tools/run_stage136_schema_registry.py
          python tools/run_stage136_release_gate.py
          python tools/run_stage137_migration_manager.py
          python tools/run_stage137_release_gate.py
          python tools/run_stage138_losdb_storage_contracts.py
          python tools/run_stage138_release_gate.py
          python tools/run_stage139_corpus_governance_pipeline.py
          python tools/run_stage139_release_gate.py
          python tools/check_stage_metadata_consistency.py
          python tools/check_release_asset_integrity.py
          python tools/run_stage140_release_integrity.py
          python tools/run_stage140_release_gate.py
          python tools/run_stage141_prose_generation_e2e.py
          python tools/run_stage141_release_gate.py
          python tools/run_stage142_longform_benchmark_pack.py
          python tools/run_stage142_release_gate.py
          python tools/run_stage143_user_cli_api_docs.py
          python tools/run_stage143_release_gate.py
          python tools/run_stage144_split_ci_runtime_strategy.py
          python tools/run_stage144_release_gate.py
          python tools/run_stage145_body_constitution.py
          python tools/run_stage145_body_constitution_gate.py
          python tools/run_stage146_narrative_state_contract.py
          python tools/run_stage146_release_gate.py
          python tools/run_stage147_project_manifest_body.py
          python tools/run_stage147_release_gate.py
          python tools/run_stage148_node_boundary_constitution.py
          python tools/run_stage148_release_gate.py
          python tools/run_stage149_body_constitution_release_gate.py
          python tools/run_stage149_release_gate.py
          python tools/run_stage150_memory_contract.py
          python tools/run_stage150_release_gate.py
          python tools/run_stage151_local_read_only_memory_store.py
          python tools/run_stage151_release_gate.py
          python tools/run_stage152_memory_query_interface.py
          python tools/run_stage152_release_gate.py
          python tools/run_stage153_memory_health_leakage_boundary.py
          python tools/run_stage153_release_gate.py
          python tools/run_stage154_page02_release_seal.py
          python tools/run_stage154_release_gate.py
          python tools/run_stage155_execution_contract.py
          python tools/run_stage155_release_gate.py
          python tools/run_stage156_local_execution_packet_store.py
          python tools/run_stage156_release_gate.py
          python tools/run_stage157_deterministic_plan_graph_builder.py
          python tools/run_stage157_release_gate.py
          python tools/run_stage158_dependency_conflict_preflight.py
          python tools/run_stage158_release_gate.py
          python tools/run_stage159_execution_dry_run_trace.py
          python tools/run_stage159_release_gate.py
          python tools/run_stage160_page03_release_seal.py
          python tools/run_stage160_release_gate.py
          python tools/run_ci_dependency_preflight.py

      - name: Build dry-run archive
        shell: bash
        run: |
          ZIP_NAME="$(python -c 'import json; from pathlib import Path; package = json.loads(Path("package_manifest.json").read_text(encoding="utf-8")); canonical = package["canonical_package"]; print(canonical[:-4] + "_cd_dry_run.zip" if canonical.endswith(".zip") else canonical + "_cd_dry_run.zip")')"
          zip -r "$ZIP_NAME" . \
            -x ".git/*" ".gitnexus/*" ".venv/*" "venv/*" \
            -x "__pycache__/*" "*.pyc" ".pytest_cache/*" \
            -x "build/*" "dist/*" "*.egg-info/*" "outputs/*"
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256"
          sha256sum "$ZIP_NAME" > SHA256SUMS_cd_dry_run.txt

      - name: Upload dry-run release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: current-stage-cd-dry-run-artifacts
          path: |
            *_cd_dry_run.zip
            *_cd_dry_run.zip.sha256
            SHA256SUMS_cd_dry_run.txt
