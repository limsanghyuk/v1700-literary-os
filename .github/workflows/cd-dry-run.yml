name: cd-dry-run

on:
  push:
    branches:
      - main
      - "stage*-*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: build-release-archive-dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify release gates
        run: |
          python -m compileall -q src tools
          python -m pytest tests/test_stage135_learning_quality_gate.py tests/test_stage136_schema_registry.py tests/test_stage137_migration_manager.py tests/test_stage138_losdb_storage_contracts.py tests/test_stage139_corpus_governance_pipeline.py -q
          python tools/run_stage135_learning_quality_gate.py
          python tools/run_stage135_release_gate.py
          python tools/run_stage136_schema_registry.py
          python tools/run_stage136_release_gate.py
          python tools/run_stage137_migration_manager.py
          python tools/run_stage137_release_gate.py
          python tools/run_stage138_losdb_storage_contracts.py
          python tools/run_stage138_release_gate.py
          python tools/run_stage139_corpus_governance_pipeline.py
          python tools/run_stage139_release_gate.py
          python tools/run_ci_dependency_preflight.py

      - name: Build dry-run archive
        shell: bash
        run: |
          ZIP_NAME="V1700_stage139_corpus_governance_pipeline_cd_dry_run_integrated_repository.zip"
          zip -r "$ZIP_NAME" . \
            -x ".git/*" ".gitnexus/*" ".venv/*" "venv/*" \
            -x "__pycache__/*" "*.pyc" ".pytest_cache/*" \
            -x "build/*" "dist/*" "*.egg-info/*" "outputs/*"
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256"
          sha256sum "$ZIP_NAME" > SHA256SUMS_stage139_cd_dry_run.txt

      - name: Upload dry-run release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage139-cd-dry-run-artifacts
          path: |
            V1700_stage139_corpus_governance_pipeline_cd_dry_run_integrated_repository.zip
            V1700_stage139_corpus_governance_pipeline_cd_dry_run_integrated_repository.zip.sha256
            SHA256SUMS_stage139_cd_dry_run.txt
