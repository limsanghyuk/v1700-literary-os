name: cd-dry-run

on:
  push:
    branches:
      - main
      - "stage/**"
      - "stage*-*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: build-release-archive-dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify release gates
        run: |
          python -m compileall -q src tools
          python tools/check_stage_metadata_consistency.py
          python tools/check_release_asset_integrity.py
          python tools/run_mandatory_predevelopment_check.py
          python tools/run_stage167_evaluation_contract.py
          python tools/run_stage167_release_gate.py
          python tools/run_stage168_local_evaluation_packet_store.py
          python tools/run_stage168_release_gate.py
          python tools/run_stage169_deterministic_quality_continuity_evaluator.py
          python tools/run_stage169_release_gate.py
          python tools/run_stage170_regression_negative_fixture_harness.py
          python tools/run_stage170_release_gate.py
          python tools/run_stage171_evaluation_boundary_leakage_preflight.py
          python tools/run_stage171_release_gate.py
          python tools/run_stage172_page05_release_seal.py
          python tools/run_stage172_release_gate.py
          python tools/run_release_gate.py
          python tools/run_stage72_repo_doctor.py
          python tools/run_ci_dependency_preflight.py

      - name: Build dry-run archive
        shell: bash
        run: |
          readarray -t PACKAGE_LINES < <(python -c 'import json; from pathlib import Path; package = json.loads(Path("package_manifest.json").read_text(encoding="utf-8")); print(package["canonical_package"]); print(package["sha256_sidecar"])')
          ZIP_NAME="${PACKAGE_LINES[0]}"
          SHA_NAME="${PACKAGE_LINES[1]}"
          DRY_RUN_ZIP="${ZIP_NAME%.zip}_cd_dry_run.zip"
          DRY_RUN_SHA="${DRY_RUN_ZIP}.sha256"
          zip -r "$DRY_RUN_ZIP" . \
            -x ".git/*" ".gitnexus/*" ".venv/*" "venv/*" \
            -x "__pycache__/*" "*.pyc" ".pytest_cache/*" \
            -x "build/*" "dist/*" "*.egg-info/*" "outputs/*"
          sha256sum "$DRY_RUN_ZIP" > "$DRY_RUN_SHA"
          sha256sum "$DRY_RUN_ZIP" > SHA256SUMS_cd_dry_run.txt

      - name: Upload dry-run release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: current-stage-cd-dry-run-artifacts
          path: |
            *_cd_dry_run.zip
            *_cd_dry_run.zip.sha256
            SHA256SUMS_cd_dry_run.txt
