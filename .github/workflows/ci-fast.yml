name: ci-fast

on:
  push:
    branches:
      - main
      - "stage/**"
      - "stage*-*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile source and tools
        run: python -m compileall -q src tools

      - name: Run Page05 active pytest suite
        run: python -m pytest tests/test_stage167_evaluation_contract.py tests/test_stage168_local_evaluation_packet_store.py tests/test_stage169_deterministic_quality_continuity_evaluator.py tests/test_stage170_regression_negative_fixture_harness.py tests/test_stage171_evaluation_boundary_leakage_preflight.py tests/test_stage172_page05_release_seal.py -q

      - name: Run mandatory predevelopment check
        run: python tools/run_mandatory_predevelopment_check.py

      - name: Check metadata and asset integrity
        run: |
          python tools/check_stage_metadata_consistency.py
          python tools/check_release_asset_integrity.py

      - name: Run Stage167 to Stage172 sequence
        run: |
          python tools/run_stage167_evaluation_contract.py
          python tools/run_stage167_release_gate.py
          python tools/run_stage168_local_evaluation_packet_store.py
          python tools/run_stage168_release_gate.py
          python tools/run_stage169_deterministic_quality_continuity_evaluator.py
          python tools/run_stage169_release_gate.py
          python tools/run_stage170_regression_negative_fixture_harness.py
          python tools/run_stage170_release_gate.py
          python tools/run_stage171_evaluation_boundary_leakage_preflight.py
          python tools/run_stage171_release_gate.py
          python tools/run_stage172_page05_release_seal.py
          python tools/run_stage172_release_gate.py
