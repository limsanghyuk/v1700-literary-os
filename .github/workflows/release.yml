name: release

on:
  push:
    tags:
      - "v1700-stage*"
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify before release
        run: |
          python -m compileall -q src tools
          python -m pytest tests/ -q
          python tools/run_stage134_meta_learner_audit.py
          python tools/run_stage134_release_gate.py
          python tools/run_stage135_learning_quality_gate.py
          python tools/run_stage135_release_gate.py
          python tools/run_stage136_schema_registry.py
          python tools/run_stage136_release_gate.py
          python tools/run_stage137_migration_manager.py
          python tools/run_stage137_release_gate.py
          python tools/run_stage138_losdb_storage_contracts.py
          python tools/run_stage138_release_gate.py
          python tools/run_release_gate.py
          python tools/run_stage72_repo_doctor.py
          python tools/run_ci_dependency_preflight.py

      - name: Build release archive and checksums
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-manual}"
          SAFE_TAG="$(echo "$TAG_NAME" | tr '/:' '__')"
          ZIP_NAME="V1700_${SAFE_TAG}_integrated_repository.zip"
          zip -r "$ZIP_NAME" . \
            -x ".git/*" ".gitnexus/*" ".venv/*" "venv/*" \
            -x "__pycache__/*" "*.pyc" ".pytest_cache/*" \
            -x "build/*" "dist/*" "*.egg-info/*" "outputs/*"
          sha256sum "$ZIP_NAME" > "$ZIP_NAME.sha256"
          if [ -f SHA256SUMS.txt ]; then
            cp SHA256SUMS.txt "SHA256SUMS_${SAFE_TAG}.txt"
          else
            sha256sum "$ZIP_NAME" > "SHA256SUMS_${SAFE_TAG}.txt"
          fi
          {
            echo "zip_name=$ZIP_NAME"
            echo "sha_name=$ZIP_NAME.sha256"
            echo "safe_tag=$SAFE_TAG"
          } >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: V1700 ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            ${{ env.zip_name }}
            ${{ env.sha_name }}
            SHA256SUMS_${{ env.safe_tag }}.txt
