name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v1700-stage*"

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python tools/regenerate_sha256sums.py
      - run: python tools/run_stage184_release_gate.py
      - run: python tools/check_release_asset_integrity.py
